controller:
  connection: "usb"
  deadzone: 0.08
  touchpad_crossfader_smoothing: 0.15
  direction_lock_threshold: 0.04
  volume_sensitivity: 0.004        # Volume change per 250 Hz frame at full stick deflection.
                                   # 0.004 ≈ 1 second of full-stick to traverse 0→1.

midi:
  port_name: "DualSense DJ"
  channel: 0  # 0-indexed (0 = MIDI channel 1) — used directly in status byte calculation

haptics:
  enabled: false

adaptive_triggers:
  enabled: false

gyro:
  roll_unit: 0
  roll_target: "mix"
  pitch_unit: 1
  pitch_target: "parameter1"
  tilt_range_degrees: 45.0

filter:
  stick_curve: "exponential"
  stick_exponent: 2.0

server:
  host: "127.0.0.1"
  port: 8765
  ui_port: 5173

macros:
  left_stick:
    - control: "filter"
      deck: "A"
      base: 0.5
      min_val: 0.0
      max_val: 0.5
  right_stick:
    - control: "filter"
      deck: "B"
      base: 0.5
      min_val: 0.0
      max_val: 0.5
